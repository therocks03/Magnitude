<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Test Series — Magnitude Eduventures</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--red:#C0392B;--red2:#E74C3C;--red-light:#FDECEC;--green:#27AE60;--green-light:#E8F8EF;--gold:#D4A017;--gold-light:#FFF8E7;--dark:#1A0A0A;--text:#2C1A1A;--text2:#6B4F4F;--bg:#FFFAF8;--bg2:#FFF5F5;--bg3:#F9F0F0;--white:#fff;--border:#F0DADA}
html{scroll-behavior:smooth}body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;overflow-x:hidden}
nav{background:rgba(255,250,248,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 5%;position:sticky;top:0;z-index:100}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:64px;gap:16px}
.nav-links{display:flex;gap:18px;list-style:none}.nav-links a{color:var(--text2);text-decoration:none;font-size:13px;transition:color .2s}.nav-links a:hover,.nav-links a.active{color:var(--red);font-weight:500}
.nav-cta{background:var(--red);color:#fff;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;transition:all .2s;white-space:nowrap}.nav-cta:hover{background:var(--red2)}
.hero{padding:64px 5% 56px;text-align:center;position:relative;overflow:hidden}
.badge{display:inline-flex;align-items:center;gap:8px;border-radius:50px;padding:5px 16px;font-size:12px;margin-bottom:18px;font-weight:500}
.badge::before{content:'';width:7px;height:7px;border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
h1{font-family:'Syne',sans-serif;font-size:clamp(30px,4vw,50px);font-weight:800;line-height:1.1;margin-bottom:16px;color:var(--dark)}
.hero-sub{color:var(--text2);font-size:15.5px;line-height:1.75;max-width:560px;margin:0 auto 28px}
.btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:28px}
.btn-r{background:var(--red);color:#fff;padding:13px 26px;border-radius:9px;text-decoration:none;font-weight:600;font-size:14px;display:inline-flex;align-items:center;gap:8px;transition:all .25s;border:none;cursor:pointer;font-family:'DM Sans',sans-serif}.btn-r:hover{background:var(--red2);transform:translateY(-2px);box-shadow:0 10px 28px rgba(192,57,43,.3)}
.btn-o{border:2px solid var(--red);color:var(--red);padding:11px 24px;border-radius:9px;text-decoration:none;font-weight:600;font-size:14px;display:inline-flex;align-items:center;gap:8px;transition:all .2s;background:transparent}.btn-o:hover{background:var(--red-light)}
.btn-g{background:var(--green);color:#fff;padding:13px 26px;border-radius:9px;text-decoration:none;font-weight:600;font-size:14px;display:inline-flex;align-items:center;gap:8px;transition:all .25s}.btn-g:hover{background:#219a52;transform:translateY(-2px)}
.sec{padding:70px 5%}.sec-alt{background:var(--bg3);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.stag{font-size:11px;letter-spacing:2px;color:var(--red);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px;font-weight:600}.stag::before{content:'';width:18px;height:2px;background:var(--red);border-radius:2px}
.stag-c{justify-content:center}.stag-c::before,.stag-c::after{content:'';flex:1;height:1px;background:var(--border)}
h2{font-family:'Syne',sans-serif;font-size:clamp(24px,3vw,38px);font-weight:800;line-height:1.12;margin-bottom:12px;color:var(--dark)}
.ssub{color:var(--text2);font-size:15px;line-height:1.7;max-width:500px;margin-bottom:44px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.card{background:#fff;border:1.5px solid var(--border);border-radius:16px;padding:26px;transition:all .3s}.card:hover{border-color:rgba(192,57,43,.35);transform:translateY(-4px);box-shadow:0 14px 32px rgba(192,57,43,.08)}
.card-icon{width:48px;height:48px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:16px}
.card-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:8px;color:var(--dark)}.card-desc{font-size:13px;color:var(--text2);line-height:1.65}
.cta-box{background:linear-gradient(135deg,#FFF0F0,#FFF8E7);border:2px solid rgba(192,57,43,.14);border-radius:22px;padding:56px 40px;text-align:center;margin:0 5% 70px}
.cta-box h2{margin-bottom:12px}.cta-box p{color:var(--text2);margin-bottom:28px}.cta-row{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
footer{background:#1A0A0A;color:#F0E8E8;padding:44px 5% 24px}
.foot-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:40px;margin-bottom:28px}
.foot-grid h5{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin-bottom:14px;color:#F0E8E8}
.foot-grid a{color:#B09090;text-decoration:none;font-size:13px;display:block;margin-bottom:9px;transition:color .2s}.foot-grid a:hover{color:#F4A4A4}
.foot-bottom{border-top:1px solid rgba(255,255,255,.06);padding-top:18px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}.foot-bottom p{font-size:12px;color:#7A5A5A}
.soc{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:12px;text-decoration:none;color:#B09090;transition:all .2s}.soc:hover{color:#F4A4A4;border-color:rgba(192,57,43,.3)}
.wa{position:fixed;bottom:22px;right:22px;z-index:999;background:#25D366;color:#fff;width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;text-decoration:none;box-shadow:0 6px 22px rgba(37,211,102,.4);animation:wab 2s ease-in-out infinite}
@keyframes wab{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.reveal{opacity:0;transform:translateY(20px);transition:opacity .6s ease,transform .6s ease}.reveal.vis{opacity:1;transform:translateY(0)}
.check-list{list-style:none;display:flex;flex-direction:column;gap:10px}.check-list li{display:flex;align-items:flex-start;gap:10px;font-size:13px;color:var(--text2);line-height:1.5}.check-list li::before{content:'✅';flex-shrink:0}
.vs-box{background:#fff;border:1.5px solid var(--border);border-radius:16px;padding:28px}.vs-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:16px;color:var(--dark)}
.pill-tag{display:inline-block;font-size:10px;padding:3px 11px;border-radius:50px;font-weight:700;text-transform:uppercase}
.tag-r{background:rgba(192,57,43,.08);color:var(--red);border:1px solid rgba(192,57,43,.2)}
.tag-g{background:var(--green-light);color:var(--green);border:1px solid rgba(39,174,96,.25)}
.tag-gold{background:var(--gold-light);color:var(--gold);border:1px solid rgba(212,160,23,.3)}
@media(max-width:860px){.grid2,.grid3,.grid4{grid-template-columns:1fr 1fr}.foot-grid{grid-template-columns:1fr}.nav-links{display:none}}
@media(max-width:560px){.grid2,.grid3,.grid4{grid-template-columns:1fr}.hero{padding:36px 5% 44px}.cta-box{padding:36px 20px}}
.reveal-script{opacity:0;transform:translateY(20px)}
</style>
<script>
window.addEventListener('DOMContentLoaded',()=>{
  const obs=new IntersectionObserver(e=>{e.forEach(x=>{if(x.isIntersecting)x.target.classList.add('vis')})},{threshold:.1});
  
</script>
</body>
</html>
